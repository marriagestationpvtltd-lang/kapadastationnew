<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Kapada Station</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: var(--primary)">
    <div class="container">
      <a class="navbar-brand" href="../index.html"><i class="fas fa-tshirt me-2"></i>Kapada Station</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html"><i class="fas fa-home me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html"><i class="fas fa-store me-1"></i>Products</a></li>
          <li class="nav-item"><a class="nav-link" href="track-booking.html"><i class="fas fa-map-marker-alt me-1"></i>Track Order</a></li>
        </ul>
        <div id="nav-auth-links"></div>
      </div>
    </div>
  </nav>

  <!-- Alert container -->
  <div id="alert-container" class="container mt-2"></div>

  <!-- Page Header -->
  <div style="background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:2rem 0">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-1">
          <li class="breadcrumb-item"><a href="../index.html" class="text-white-50">Home</a></li>
          <li class="breadcrumb-item text-white active">Products</li>
        </ol>
      </nav>
      <h3 class="text-white fw-bold mb-0" id="page-heading">All Products</h3>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container py-4">
    <div class="row g-4">
      <!-- Sidebar Filters -->
      <div class="col-md-3">
        <div class="filter-card mb-3">
          <h6><i class="fas fa-list me-2"></i>Categories</h6>
          <div id="category-filters">
            <div class="form-check mb-1">
              <input class="form-check-input" type="checkbox" value="ladies" id="cat-ladies" onchange="loadProducts()">
              <label class="form-check-label" for="cat-ladies"><i class="fas fa-female me-1 text-muted"></i>Ladies' Wear</label>
            </div>
            <div class="form-check mb-1">
              <input class="form-check-input" type="checkbox" value="gents" id="cat-gents" onchange="loadProducts()">
              <label class="form-check-label" for="cat-gents"><i class="fas fa-male me-1 text-muted"></i>Gents' Wear</label>
            </div>
            <div class="form-check mb-1">
              <input class="form-check-input" type="checkbox" value="kids" id="cat-kids" onchange="loadProducts()">
              <label class="form-check-label" for="cat-kids"><i class="fas fa-child me-1 text-muted"></i>Kids' Wear</label>
            </div>
            <div class="form-check mb-1">
              <input class="form-check-input" type="checkbox" value="footwear" id="cat-footwear" onchange="loadProducts()">
              <label class="form-check-label" for="cat-footwear"><i class="fas fa-shoe-prints me-1 text-muted"></i>Footwear</label>
            </div>
            <div class="form-check mb-1">
              <input class="form-check-input" type="checkbox" value="jewelry" id="cat-jewelry" onchange="loadProducts()">
              <label class="form-check-label" for="cat-jewelry"><i class="fas fa-gem me-1 text-muted"></i>Jewelry</label>
            </div>
            <div class="form-check mb-1">
              <input class="form-check-input" type="checkbox" value="accessories" id="cat-accessories" onchange="loadProducts()">
              <label class="form-check-label" for="cat-accessories"><i class="fas fa-hat-cowboy me-1 text-muted"></i>Accessories</label>
            </div>
          </div>
        </div>

        <div class="filter-card mb-3">
          <h6><i class="fas fa-sort me-2"></i>Sort By</h6>
          <select class="form-select form-select-sm" id="sort-select" onchange="loadProducts()">
            <option value="newest">Newest First</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
            <option value="popular">Most Popular</option>
          </select>
        </div>

        <div class="filter-card mb-3">
          <h6><i class="fas fa-tags me-2"></i>Price Range (₹/day)</h6>
          <div class="row g-2 mb-2">
            <div class="col-6">
              <input type="number" class="form-control form-control-sm" id="price-min" placeholder="Min" min="0">
            </div>
            <div class="col-6">
              <input type="number" class="form-control form-control-sm" id="price-max" placeholder="Max" min="0">
            </div>
          </div>
          <button class="btn btn-sm btn-primary w-100" onclick="loadProducts()">Apply Filter</button>
        </div>

        <div class="filter-card">
          <h6><i class="fas fa-circle-check me-2"></i>Availability</h6>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="avail-only" onchange="loadProducts()">
            <label class="form-check-label" for="avail-only">Available Only</label>
          </div>
        </div>
      </div>

      <!-- Products Grid -->
      <div class="col-md-9">
        <!-- Search & Results info -->
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
          <div class="input-group" style="max-width:350px">
            <input type="text" class="form-control" id="search-input" placeholder="Search products...">
            <button class="btn btn-primary" onclick="loadProducts()"><i class="fas fa-search"></i></button>
          </div>
          <div id="results-info" class="text-muted small"></div>
        </div>

        <div class="row g-4" id="products-grid">
          <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
          </div>
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-center mt-4" id="pagination-container"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="py-4 mt-4">
    <div class="container text-center">
      <p class="mb-0" style="color:rgba(255,255,255,0.5);font-size:0.85rem">© 2024 Kapada Station. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script>
    let currentPage = 1;
    const limit = 12;

    // Read URL params on load
    const urlParams = new URLSearchParams(window.location.search);
    const urlSearch = urlParams.get('search') || '';
    const urlCategory = urlParams.get('category') || '';

    if (urlSearch) document.getElementById('search-input').value = urlSearch;
    if (urlCategory) {
      const cb = document.getElementById('cat-' + urlCategory);
      if (cb) cb.checked = true;
      document.getElementById('page-heading').textContent = urlCategory.charAt(0).toUpperCase() + urlCategory.slice(1) + "'s Wear";
    }

    function getSelectedCategories() {
      const checks = document.querySelectorAll('#category-filters input[type="checkbox"]:checked');
      return Array.from(checks).map(c => c.value);
    }

    async function loadProducts(page = 1) {
      currentPage = page;
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>';

      const search = document.getElementById('search-input').value.trim();
      const categories = getSelectedCategories();
      const sort = document.getElementById('sort-select').value;
      const priceMin = document.getElementById('price-min').value;
      const priceMax = document.getElementById('price-max').value;
      const availOnly = document.getElementById('avail-only').checked;

      const params = new URLSearchParams({
        page: currentPage,
        limit: limit,
        sort: sort
      });
      if (search) params.set('search', search);
      if (categories.length === 1) params.set('category', categories[0]);
      if (priceMin) params.set('min_price', priceMin);
      if (priceMax) params.set('max_price', priceMax);
      if (availOnly) params.set('status', 'available');

      try {
        const res = await fetch(`${API_BASE}/products/list.php?${params}`);
        const data = await res.json();

        if (data.success && data.products && data.products.length > 0) {
          grid.innerHTML = data.products.map(p => renderCard(p)).join('');
          document.getElementById('results-info').textContent = `Showing ${data.products.length} of ${data.total || data.products.length} products`;
          renderPagination(data.total || data.products.length);
        } else {
          grid.innerHTML = `<div class="col-12 text-center py-5"><i class="fas fa-search fa-3x text-muted mb-3 d-block"></i><h5 class="text-muted">No products found</h5><p class="text-muted">Try different filters or <a href="products.html">clear all filters</a></p></div>`;
          document.getElementById('results-info').textContent = '';
          document.getElementById('pagination-container').innerHTML = '';
        }
      } catch (e) {
        grid.innerHTML = '<div class="col-12 text-center py-5 text-danger"><i class="fas fa-exclamation-triangle fa-2x mb-2 d-block"></i>Failed to load products. Please try again.</div>';
      }
    }

    function renderCard(p) {
      const img = (p.images && p.images[0])
        ? `${UPLOAD_BASE}/products/${p.images[0]}`
        : `https://via.placeholder.com/400x250/6c3483/ffffff?text=${encodeURIComponent(p.name || 'Outfit')}`;
      const statusBadge = p.status === 'available'
        ? '<span class="badge bg-success position-absolute top-0 start-0 m-2">Available</span>'
        : '<span class="badge bg-danger position-absolute top-0 start-0 m-2">Unavailable</span>';
      return `
        <div class="col-md-4 col-sm-6">
          <div class="product-card">
            <div class="position-relative overflow-hidden">
              <img src="${img}" alt="${escapeHtml(p.name)}" class="card-img-top" onerror="this.src='https://via.placeholder.com/400x250/6c3483/ffffff?text=No+Image'">
              <span class="price-badge">${formatCurrency(p.rental_price_per_day)}/day</span>
              ${statusBadge}
            </div>
            <div class="card-body">
              <span class="badge mb-1" style="background:var(--primary)">${escapeHtml(p.category || '')}</span>
              <h5 class="card-title">${escapeHtml(p.name)}</h5>
              <p class="text-muted small mb-2">${truncateText(p.description || '', 80)}</p>
              <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted small">Deposit: ${formatCurrency(p.deposit_amount)}</span>
                <a href="product-detail.html?id=${p.id}" class="btn btn-sm btn-primary">View Details</a>
              </div>
            </div>
          </div>
        </div>`;
    }

    function renderPagination(total) {
      const totalPages = Math.ceil(total / limit);
      if (totalPages <= 1) { document.getElementById('pagination-container').innerHTML = ''; return; }
      let html = '<nav><ul class="pagination">';
      html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadProducts(${currentPage - 1});return false;">Previous</a></li>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" onclick="loadProducts(${i});return false;">${i}</a></li>`;
      }
      html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadProducts(${currentPage + 1});return false;">Next</a></li>`;
      html += '</ul></nav>';
      document.getElementById('pagination-container').innerHTML = html;
    }

    document.getElementById('search-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') loadProducts();
    });

    loadProducts();
  </script>
</body>
</html>
