<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kapada Station</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="min-height:100vh;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%)">

  <!-- Navbar -->
  <nav class="navbar navbar-dark" style="background:rgba(0,0,0,0.2)">
    <div class="container">
      <a class="navbar-brand" href="../index.html"><i class="fas fa-tshirt me-2"></i>Kapada Station</a>
      <div id="nav-auth-links"></div>
    </div>
  </nav>

  <div id="alert-container" class="container mt-2"></div>

  <div class="container py-4">
    <div class="auth-card mx-auto">
      <div class="card">
        <div class="auth-header">
          <i class="fas fa-user-circle"></i>
          <h4>Welcome Back!</h4>
          <p class="mb-0 opacity-75 small">Sign in to your Kapada Station account</p>
        </div>
        <div class="card-body p-4">
          <form id="login-form" novalidate>
            <div class="mb-3">
              <label class="form-label" for="email"><i class="fas fa-envelope me-1 text-muted"></i>Email Address</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required autofocus autocomplete="email">
              <div class="invalid-feedback">Please enter a valid email.</div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="password"><i class="fas fa-lock me-1 text-muted"></i>Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
                <button type="button" class="btn btn-outline-secondary" id="toggle-password" tabindex="-1">
                  <i class="fas fa-eye" id="eye-icon"></i>
                </button>
              </div>
              <div class="invalid-feedback">Please enter your password.</div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember-me">
                <label class="form-check-label small" for="remember-me">Remember me</label>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="login-btn">
              <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
          </form>

          <hr class="my-4">

          <div class="text-center">
            <p class="mb-2">Don't have an account? <a href="register.html" class="fw-semibold" style="color:var(--primary)">Register here</a></p>
            <p class="mb-0"><a href="track-booking.html" class="text-muted small"><i class="fas fa-search me-1"></i>Track booking without account</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) {
      const returnUrl = new URLSearchParams(window.location.search).get('returnUrl');
      if (returnUrl && returnUrl.startsWith(window.location.origin)) {
        window.location.href = returnUrl;
      } else if (isAdmin()) {
        window.location.href = 'admin/dashboard.html';
      } else {
        window.location.href = '../index.html';
      }
    }

    // Password toggle
    document.getElementById('toggle-password').addEventListener('click', function() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please enter email and password.', 'warning');
        return;
      }

      const btn = document.getElementById('login-btn');
      const origText = btn.innerHTML;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/auth/login.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success && data.token) {
          setAuth(data.token, data.user);
          const returnUrl = new URLSearchParams(window.location.search).get('returnUrl');
          if (returnUrl && returnUrl.startsWith(window.location.origin)) {
            window.location.href = returnUrl;
          } else if (data.user && data.user.role === 'admin') {
            window.location.href = 'admin/dashboard.html';
          } else if (returnUrl) {
            window.location.href = returnUrl;
          } else {
            window.location.href = '../index.html';
          }
        } else {
          showAlert(data.message || data.error || 'Invalid email or password.', 'danger');
        }
      } catch (err) {
        showAlert('Connection error. Please try again.', 'danger');
      }
      btn.innerHTML = origText;
      btn.disabled = false;
    });
  </script>
</body>
</html>
