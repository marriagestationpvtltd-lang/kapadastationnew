<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Users - Kapada Station</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body data-requires-admin="true">
<div class="admin-wrapper">

  <!-- Sidebar -->
  <div class="admin-sidebar">
    <a href="../../index.html" class="sidebar-brand"><i class="fas fa-tshirt me-2"></i><strong>Kapada Station</strong></a>
    <nav class="nav flex-column p-2">
      <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
      <a href="products.html" class="nav-link"><i class="fas fa-box me-2"></i>Products</a>
      <a href="bookings.html" class="nav-link"><i class="fas fa-calendar me-2"></i>Bookings</a>
      <a href="payments.html" class="nav-link"><i class="fas fa-money-bill me-2"></i>Payments</a>
      <a href="users.html" class="nav-link active"><i class="fas fa-users me-2"></i>Users</a>
      <a href="database.html" class="nav-link"><i class="fas fa-database me-2"></i>Database</a>
      <hr style="border-color:rgba(255,255,255,0.3)">
      <a href="../../index.html" class="nav-link"><i class="fas fa-home me-2"></i>View Site</a>
      <button id="logout-btn" class="btn btn-outline-light btn-sm mt-2 ms-1"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="admin-content">
    <div id="alert-container" class="mb-3"></div>

    <div class="admin-topbar">
      <div>
        <h5 class="fw-bold mb-0">Users Management</h5>
        <small class="text-muted">Manage registered users</small>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <span class="badge bg-primary px-3 py-2" id="badge-total">Total: 0</span>
        <span class="badge bg-success px-3 py-2" id="badge-verified">Verified: 0</span>
      </div>
    </div>

    <!-- Search -->
    <div class="card mb-4">
      <div class="card-body p-3">
        <div class="row g-3">
          <div class="col-md-5">
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-search"></i></span>
              <input type="text" class="form-control" id="search-input" placeholder="Search by name, email or phone..." oninput="filterUsers()">
            </div>
          </div>
          <div class="col-md-2">
            <select class="form-select" id="filter-role" onchange="filterUsers()">
              <option value="">All Roles</option>
              <option value="customer">Customers</option>
              <option value="admin">Admins</option>
            </select>
          </div>
          <div class="col-md-2">
            <select class="form-select" id="filter-verified" onchange="filterUsers()">
              <option value="">All</option>
              <option value="1">Verified</option>
              <option value="0">Not Verified</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Users Table -->
    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Role</th>
                <th>Verified</th>
                <th>Joined</th>
                <th>Bookings</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="8" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- User Bookings Modal -->
<div class="modal fade" id="userBookingsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-box me-2"></i>User Bookings — <span id="modal-user-name"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="user-bookings-body">
        <div class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit User Role Modal -->
<div class="modal fade" id="editUserModal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-user-edit me-2"></i>Edit User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-user-id">
        <div class="mb-3">
          <label class="form-label">Role</label>
          <select class="form-select" id="edit-user-role">
            <option value="customer">Customer</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="edit-user-verified">
          <label class="form-check-label">Mark as Verified</label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveUserEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/config.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/app.js"></script>
<script>
  let allUsers = [];

  async function loadUsers() {
    try {
      const data = await fetchAPI('/admin/users.php');
      if (data && data.success) {
        allUsers = data.users || [];
        const verified = allUsers.filter(u => u.is_verified == 1 || u.is_verified === true).length;
        document.getElementById('badge-total').textContent = 'Total: ' + allUsers.length;
        document.getElementById('badge-verified').textContent = 'Verified: ' + verified;
        renderTable(allUsers);
      }
    } catch (e) {
      document.getElementById('users-tbody').innerHTML = '<tr><td colspan="8" class="text-center text-danger py-3">Failed to load users</td></tr>';
    }
  }

  function renderTable(users) {
    const tbody = document.getElementById('users-tbody');
    if (!users || users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No users found</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => {
      const isVerified = u.is_verified == 1 || u.is_verified === true;
      const roleBadge = u.role === 'admin'
        ? '<span class="badge" style="background:var(--primary)">Admin</span>'
        : '<span class="badge bg-secondary">Customer</span>';
      const verifiedBadge = isVerified
        ? '<span class="badge bg-success"><i class="fas fa-check me-1"></i>Verified</span>'
        : '<span class="badge bg-warning text-dark"><i class="fas fa-times me-1"></i>Unverified</span>';
      return `
        <tr>
          <td>
            <div class="d-flex align-items-center gap-2">
              <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width:36px;height:36px;background:rgba(108,52,131,0.1);color:var(--primary);font-weight:600;font-size:0.9rem">
                ${(u.full_name || u.name || 'U')[0].toUpperCase()}
              </div>
              <span class="fw-semibold">${escapeHtml(u.full_name || u.name || '')}</span>
            </div>
          </td>
          <td class="small">${escapeHtml(u.email || '')}</td>
          <td class="small">${escapeHtml(u.phone || '')}</td>
          <td>${roleBadge}</td>
          <td>${verifiedBadge}</td>
          <td class="small">${formatDate(u.created_at || u.joined_at)}</td>
          <td class="text-center">${u.booking_count || 0}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary me-1" onclick="viewUserBookings(${u.id}, '${escapeHtml(u.full_name || u.name || '')}')" title="View Bookings">
              <i class="fas fa-box"></i>
            </button>
            <button class="btn btn-sm btn-outline-secondary me-1" onclick="openEditUser(${u.id})" title="Edit User">
              <i class="fas fa-user-edit"></i>
            </button>
            <button class="btn btn-sm ${isVerified ? 'btn-outline-warning' : 'btn-outline-success'}" onclick="toggleVerified(${u.id}, ${isVerified ? 0 : 1})" title="${isVerified ? 'Revoke Verification' : 'Verify User'}">
              <i class="fas fa-${isVerified ? 'user-times' : 'user-check'}"></i>
            </button>
          </td>
        </tr>`;
    }).join('');
  }

  function filterUsers() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const role = document.getElementById('filter-role').value;
    const verified = document.getElementById('filter-verified').value;
    const filtered = allUsers.filter(u => {
      const matchSearch = !search ||
        (u.full_name||u.name||'').toLowerCase().includes(search) ||
        (u.email||'').toLowerCase().includes(search) ||
        (u.phone||'').toLowerCase().includes(search);
      const matchRole = !role || u.role === role;
      const matchVerified = verified === '' || String(u.is_verified ? 1 : 0) === verified;
      return matchSearch && matchRole && matchVerified;
    });
    renderTable(filtered);
  }

  async function toggleVerified(userId, newValue) {
    try {
      const data = await fetchAPI(`/admin/users.php?id=${userId}`, {
        method: 'PUT',
        body: JSON.stringify({ is_verified: newValue })
      });
      if (data && data.success) {
        showAlert(`User ${newValue ? 'verified' : 'unverified'} successfully.`, 'success');
        loadUsers();
      } else {
        showAlert((data && data.message) || 'Update failed.', 'danger');
      }
    } catch (e) {
      showAlert('Network error.', 'danger');
    }
  }

  function openEditUser(id) {
    const u = allUsers.find(x => x.id == id);
    if (!u) return;
    document.getElementById('edit-user-id').value = u.id;
    document.getElementById('edit-user-role').value = u.role || 'customer';
    document.getElementById('edit-user-verified').checked = u.is_verified == 1 || u.is_verified === true;
    new bootstrap.Modal(document.getElementById('editUserModal')).show();
  }

  async function saveUserEdit() {
    const id = document.getElementById('edit-user-id').value;
    const role = document.getElementById('edit-user-role').value;
    const is_verified = document.getElementById('edit-user-verified').checked ? 1 : 0;
    try {
      const data = await fetchAPI(`/admin/users.php?id=${id}`, {
        method: 'PUT',
        body: JSON.stringify({ role, is_verified })
      });
      if (data && data.success) {
        bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
        showAlert('User updated successfully.', 'success');
        loadUsers();
      } else {
        showAlert((data && data.message) || 'Update failed.', 'danger');
      }
    } catch (e) {
      showAlert('Network error.', 'danger');
    }
  }

  async function viewUserBookings(userId, userName) {
    document.getElementById('modal-user-name').textContent = userName;
    document.getElementById('user-bookings-body').innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></div>';
    new bootstrap.Modal(document.getElementById('userBookingsModal')).show();

    try {
      const data = await fetchAPI(`/admin/bookings.php?user_id=${userId}`);
      const statusClasses = { pending:'status-badge-pending', confirmed:'status-badge-confirmed', active:'status-badge-active', returned:'status-badge-returned', cancelled:'status-badge-cancelled' };
      if (data && data.success && data.bookings && data.bookings.length > 0) {
        document.getElementById('user-bookings-body').innerHTML = `
          <div class="table-responsive">
            <table class="table table-hover mb-0 small">
              <thead><tr><th>Tracking Code</th><th>Product</th><th>Start</th><th>End</th><th>Total</th><th>Status</th></tr></thead>
              <tbody>
                ${data.bookings.map(b => `
                  <tr>
                    <td><code>${escapeHtml(b.tracking_code||'')}</code></td>
                    <td>${escapeHtml(b.product_name||'N/A')}</td>
                    <td>${formatDate(b.rental_start)}</td>
                    <td>${formatDate(b.rental_end)}</td>
                    <td>${formatCurrency(b.rental_amount)}</td>
                    <td><span class="${statusClasses[b.status]||'status-badge-pending'}">${(b.status||'').toUpperCase()}</span></td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>`;
      } else {
        document.getElementById('user-bookings-body').innerHTML = '<div class="text-center text-muted py-4"><i class="fas fa-box-open fa-2x mb-2 d-block"></i>No bookings found for this user.</div>';
      }
    } catch (e) {
      document.getElementById('user-bookings-body').innerHTML = '<div class="text-center text-danger py-3">Failed to load bookings.</div>';
    }
  }

  loadUsers();
</script>
</body>
</html>
