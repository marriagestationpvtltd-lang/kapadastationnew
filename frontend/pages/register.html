<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Kapada Station</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="min-height:100vh;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%)">

  <!-- Navbar -->
  <nav class="navbar navbar-dark" style="background:rgba(0,0,0,0.2)">
    <div class="container">
      <a class="navbar-brand" href="../index.html"><i class="fas fa-tshirt me-2"></i>Kapada Station</a>
      <div id="nav-auth-links"></div>
    </div>
  </nav>

  <div id="alert-container" class="container mt-2"></div>

  <div class="container py-4">
    <div class="mx-auto" style="max-width:520px">
      <div class="card">
        <div class="auth-header">
          <i class="fas fa-user-plus"></i>
          <h4>Create Account</h4>
          <p class="mb-0 opacity-75 small">Join thousands of happy customers</p>
        </div>
        <div class="card-body p-4">
          <form id="register-form" novalidate>
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-user me-1 text-muted"></i>Full Name *</label>
              <input type="text" class="form-control" id="full_name" name="full_name" placeholder="Your full name" required autocomplete="name">
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-envelope me-1 text-muted"></i>Email Address *</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-phone me-1 text-muted"></i>Phone Number *</label>
              <input type="tel" class="form-control" id="phone" name="phone" placeholder="+91 XXXXX XXXXX" required autocomplete="tel">
            </div>
            <div class="mb-2">
              <label class="form-label"><i class="fas fa-lock me-1 text-muted"></i>Password *</label>
              <div class="input-group">
                <input type="password" class="form-control" id="password" name="password" placeholder="Min. 8 characters" required autocomplete="new-password">
                <button type="button" class="btn btn-outline-secondary" id="toggle-pass">
                  <i class="fas fa-eye" id="eye-icon"></i>
                </button>
              </div>
              <div class="password-strength mt-1" id="pw-strength-bar"><div class="password-strength-bar"></div></div>
              <div class="password-strength-text text-muted" id="pw-strength-text"></div>
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="fas fa-lock me-1 text-muted"></i>Confirm Password *</label>
              <input type="password" class="form-control" id="confirm_password" placeholder="Re-enter password" required autocomplete="new-password">
              <div class="invalid-feedback" id="confirm-error"></div>
            </div>
            <div class="mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label small" for="terms">
                  I agree to the <a href="#" class="fw-semibold" style="color:var(--primary)">Terms & Conditions</a> and <a href="#" class="fw-semibold" style="color:var(--primary)">Privacy Policy</a>
                </label>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="register-btn">
              <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
          </form>

          <hr class="my-4">
          <p class="text-center mb-0">Already have an account? <a href="login.html" class="fw-semibold" style="color:var(--primary)">Sign in here</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = '../index.html';

    // Password show/hide
    document.getElementById('toggle-pass').addEventListener('click', function() {
      const inp = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (inp.type === 'password') { inp.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
      else { inp.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
    });

    // Password strength
    document.getElementById('password').addEventListener('input', function() {
      const val = this.value;
      const bar = document.getElementById('pw-strength-bar');
      const text = document.getElementById('pw-strength-text');
      bar.classList.remove('strength-weak','strength-medium','strength-strong');

      if (!val) { text.textContent = ''; return; }

      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      if (score <= 1) {
        bar.classList.add('strength-weak');
        text.textContent = 'Weak password';
        text.className = 'password-strength-text text-danger';
      } else if (score === 2 || score === 3) {
        bar.classList.add('strength-medium');
        text.textContent = 'Medium password';
        text.className = 'password-strength-text text-warning';
      } else {
        bar.classList.add('strength-strong');
        text.textContent = 'Strong password';
        text.className = 'password-strength-text text-success';
      }
    });

    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const full_name = document.getElementById('full_name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm_password').value;
      const terms = document.getElementById('terms').checked;

      if (!full_name || !email || !phone || !password) {
        showAlert('Please fill in all required fields.', 'warning'); return;
      }
      if (password !== confirm) {
        document.getElementById('confirm_password').classList.add('is-invalid');
        document.getElementById('confirm-error').textContent = 'Passwords do not match.';
        return;
      }
      document.getElementById('confirm_password').classList.remove('is-invalid');
      if (password.length < 8) { showAlert('Password must be at least 8 characters.', 'warning'); return; }
      if (!terms) { showAlert('Please accept the terms and conditions.', 'warning'); return; }

      const btn = document.getElementById('register-btn');
      const orig = btn.innerHTML;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/auth/register.php`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: full_name, email, phone, password })
        });
        const data = await res.json();
        if (data.success && data.token) {
          setAuth(data.token, data.user);
          showAlert('Account created successfully! Redirecting...', 'success');
          setTimeout(() => window.location.href = 'profile.html', 1500);
        } else {
          showAlert(data.message || data.error || 'Registration failed. Please try again.', 'danger');
        }
      } catch (err) {
        showAlert('Connection error. Please try again.', 'danger');
      }
      btn.innerHTML = orig;
      btn.disabled = false;
    });
  </script>
</body>
</html>
